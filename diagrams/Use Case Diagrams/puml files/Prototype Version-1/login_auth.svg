ccess.</text><text fill="#000000" font-family="Georgia" font-size="11" lengthAdjust="spacing" textLength="171.3809" x="494" y="489.9897">Failed tokens offer a resend option.</text></g><g class="entity" data-qualified-name="GMN38" data-source-line="76" id="ent0039"><path d="M195,42.9072 L195,90.4028 L427.3203,90.4028 L427.3203,52.9072 L417.3203,42.9072 L195,42.9072" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M417.3203,42.9072 L417.3203,52.9072 L427.3203,52.9072 L417.3203,42.9072" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="Georgia" font-size="11" lengthAdjust="spacing" textLength="211.3203" x="201" y="57.9941">User requests reset; System sends token via</text><text fill="#000000" font-family="Georgia" font-size="11" lengthAdjust="spacing" textLength="188.6436" x="201" y="70.4927">Email Service. Token expires in 1 hour.</text><text fill="#000000" font-family="Georgia" font-size="11" lengthAdjust="spacing" textLength="169.3828" x="201" y="82.9912">On success, redirects to login page.</text></g><!--link User to UC01--><g class="link" data-entity-1="ent0002" data-entity-2="ent0006" data-link-type="dependency" data-source-line="35" id="lnk15"><path d="M85.01,198.1172 C94.38,192.0272 104.68,186.3172 115,182.4072 C160.36,165.2372 209.3979,159.4242 249.4179,157.3742" fill="none" id="User-to-UC01" style="stroke:#111111;stroke-width:1;"/><polygon fill="#111111" points="255.41,157.0672,246.2172,153.5329,250.4165,157.323,246.6264,161.5224,255.41,157.0672" style="stroke:#111111;stroke-width:1;"/></g><!--link User to UC02--><g class="link" data-entity-1="ent0002" data-entity-2="ent0007" data-link-type="dependency" data-source-line="36" id="lnk16"><path d="M85,225.0672 C111.08,225.0372 144.42,229.7072 165,250.4072 C218.17,303.8872 148.22,358.2572 195,417.4072 C213.71,441.0572 240.0251,452.2296 265.5751,458.9096" fill="none" id="User-to-UC02" style="stroke:#111111;stroke-width:1;"/><polygon fill="#111111" points="27