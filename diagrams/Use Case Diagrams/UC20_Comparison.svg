0 1530.5,58.7373" fill="#FFFDE7" style="stroke:#F9A825;stroke-width:1;"/><path d="M1798.7007,58.7373 L1798.7007,68.7373 L1808.7007,68.7373 L1798.7007,58.7373" fill="#FFFDE7" style="stroke:#F9A825;stroke-width:1;"/><text fill="#000000" font-family="Verdana" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="211.5864" x="1536.5" y="76.8071">Represents three user types:</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="192.5498" x="1536.5" y="92.6064">&#8226; A01: Small Business Owner</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="257.2007" x="1536.5" y="108.4058">&#8226; A02: Franchise/MNC Expansion Team</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="167.4639" x="1536.5" y="124.2051">&#8226; A03: Commercial Agent</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="4.5703" x="1536.5" y="140.0044">&#160;</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="219.3052" x="1536.5" y="155.8037">All have identical use case access</text></g><g class="entity" data-qualified-name="GMN26" data-source-line="74" id="ent0027"><path d="M1012,240.7373 L1012,470.7373 L817.85,474.7373 L1012,478.7373 L1012,708.9175 A0,0 0 0 0 1012,708.9175 L1383.3716,708.9175 A0,0 0 0 0 1383.3716,708.9175 L1383.3716,250.7373 L1373.3716,240.7373 L1012,240.7373 A0,0 0 0 0 1012,240.7373" fill="#FFFDE7" style="stroke:#F9A825;stroke-width:1;"/><path d="M1373.3716,240.7373 L1373.3716,250.7373 L1383.3716,250.7373 L1373.3716,240.7373" fill="#FFFDE7" style="stroke:#F9A825;stroke-width:1;"/><text fill="#000000" font-family="Verdana" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="51.9937" x="1018" y="258.8071">Actors:</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="293.8076" x="1074.564" y="258.8071">A01/A02/A03 (initiating), A04 (participating)</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="4.5703" x="1018" y="274.6064">&#160;</text><text fill="#000000" font-family="Verdana" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="105.4854" x="1018" y="290.4058">Preconditions:</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="126.4897" x="1018" y="306.2051">1. User is logged in</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="225.0498" x="1018" y="322.0044">2. At least 2 candidate sites saved</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="228.5093" x="1031.7109" y="337.8037">under the selected Business Profile</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="4.5703" x="1018" y="353.603">&#160;</text><text fill="#000000" font-family="Verdana" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="112.9502" x="1018" y="369.4023">Postconditions:</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="241.8774" x="1018" y="385.2017">1. Side-by-side score table displayed</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="197.8564" x="1031.7109" y="401.001">for all four scoring dimensions</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="198.5928" x="1018" y="416.8003">2. Bar or radar chart rendered</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="4.5703" x="1018" y="432.5996">&#160;</text><text fill="#000000" font-family="Verdana" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="39.7871" x="1018" y="448.3989">Flow:</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="245.4639" x="1018" y="464.1982">1. User opens Comparison dashboard</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="224.231" x="1018" y="479.9976">2. A04 retrieves candidate site list</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="157.7646" x="1018" y="495.7969">3. User selects 2-3 sites</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="225.0688" x="1018" y="511.5962">4. A04 validates selection (max 3)</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="198.1865" x="1018" y="527.3955">5. A04 retrieves full scores for</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="210.355" x="1031.7109" y="543.1948">selected sites (all 4 dimensions)</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="214.6079" x="1018" y="558.9941">6. A04 formats comparison table</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="107.0532" x="1031.7109" y="574.7935">per FR-SCD-002</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="183.8154" x="1018" y="590.5928">7. A04 generates chart data</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="107.0532" x="1031.7109" y="606.3921">per FR-SCD-003</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="4.5703" x="1018" y="622.1914">&#160;</text><text fill="#000000" font-family="Verdana" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="166.8989" x="1018" y="637.9907">Dimensions compared:</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="141.5337" x="1018" y="653.79">&#8226; Demographic Match</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="90.5684" x="1018" y="669.5894">&#8226; Accessibility</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="113.9341" x="1018" y="685.3887">&#8226; Rental Pressure</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="144.3267" x="1018" y="701.188">&#8226; Competition Density</text></g><g class="entity" data-qualified-name="GMN29" data-source-line="106" id="ent0030"><path d="M365,999.7373 L365,1136.1318 A0,0 0 0 0 365,1136.1318 L569.5044,1136.1318 A0,0 0 0 0 569.5044,1136.1318 L569.5044,1009.7373 L559.5044,999.7373 L461.5,999.7373 L443.16,902.6473 L453.5,999.7373 L365,999.7373 A0,0 0 0 0 365,999.7373" fill="#FFFDE7" style="stroke:#F9A825;stroke-width:1;"/><path d="M559.5044,999.7373 L559.5044,1009.7373 L569.5044,1009.7373 L559.5044,999.7373" fill="#FFFDE7" style="stroke:#F9A825;stroke-width:1;"/><text fill="#000000" font-family="Verdana" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="138.9819" x="371" y="1017.8071">AC.1 - Max 3 guard</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="162.2778" x="371" y="1033.6064">Blocks 4th site selection.</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="169.7808" x="371" y="1049.4058">Shows: "Maximum 3 sites</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="103.7651" x="371" y="1065.2051">for comparison"</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="4.5703" x="371" y="1081.0044">&#160;</text><text fill="#000000" font-family="Verdana" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="183.5044" x="371" y="1096.8037">EX.1 - Missing score data</text><text fill="#000000" font-family="Verdana" f