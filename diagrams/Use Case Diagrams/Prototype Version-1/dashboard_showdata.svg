ont-size="11" lengthAdjust="spacing" textLength="28.5957" x="28" y="493.9927">(A04)</text></g><g class="entity" data-qualified-name="GMN20" data-source-line="46" id="ent0021"><path d="M351,333.9072 L351,359.9072 L287.81,363.9072 L351,367.9072 L351,393.9014 A0,0 0 0 0 351,393.9014 L600.481,393.9014 A0,0 0 0 0 600.481,393.9014 L600.481,343.9072 L590.481,333.9072 L351,333.9072 A0,0 0 0 0 351,333.9072" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M590.481,333.9072 L590.481,343.9072 L600.481,343.9072 L590.481,333.9072" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="Georgia" font-size="11" lengthAdjust="spacing" textLength="210.7402" x="357" y="348.9941">Users and System access dashboard to view</text><text fill="#000000" font-family="Georgia" font-size="11" lengthAdjust="spacing" textLength="201.1851" x="357" y="361.4927">data freshness status. A04 retrieves latest</text><text fill="#000000" font-family="Georgia" font-size="11" lengthAdjust="spacing" textLength="207.3081" x="357" y="373.9912">ETL job logs, computes staleness warnings</text><text fill="#000000" font-family="Georgia" font-size="11" lengthAdjust="spacing" textLength="228.481" x="357" y="386.4897">(if &gt; 30 days old), and returns status summary.</text></g><g class="entity" data-qualified-name="GMN23" data-source-line="53" id="ent0024"><path d="M376,160.9072 L376,186.9072 L288.14,190.9072 L376,194.9072 L376,220.9014 A0,0 0 0 0 376,220.9014 L574.5254,220.9014 A0,0 0 0 0 574.5254,220.9014 L574.5254,170.9072 L564.5254,160.9072 L376,160.9072 A0,0 0 0 0 376,160.9072" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M564.5254,160.9072 L564.5254,170.9072 L574.5254,170.9072 L564.5254,160.9072" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="Georgia" font-size="11" lengthAdjust="spacing" textLength="176.7144" x="382" y="175.9941">Displays a summary list of the user's</text><text fill="#000000" font-family="Georgia" font-size="11" lengthAdjust="spacing" textLength="177.5254" x="382" y="188.4927">recently created or updated business</text><text fill="#000000" font-family="Georgia" font-size="11" lengthAdjust="spacing" textLength="176.9453" x="382" y="200.9912">profiles. Provides quick-access CTAs</text><text fill="#000000" font-family="Georgia" font-size="11" lengthAdjust="spacing" textLength="138.1499" x="382" y="213.4897">to create or manage profiles.</text></g><g class="entity" data-qualified-name="GMN26" data-source-line="60" id="ent0027"><path d="M373,508.9072 L373,534.9072 L284.13,538.9072 L373,542.9072 L373,568.9014 A0,0 0 0 0 373,568.9014 L577.6001,568.9014 A0,0 0 0 0 577.6001,568.9014 L577.6001,518.9072 L567.6001,508.9072 L373,508.9072 A0,0 0 0 0 373,508.9072" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M567.6001,508.9072 L567.6001,518.9072 L577.6001,518.9072 L567.6001,508.9072" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="Georgia" font-size="11" lengthAdjust="spacing" textLength="181.9834" x="379" y="523.9941">Displays a summary of recently saved</text><text fill="#000000" font-family="Georgia" font-size="11" lengthAdjust="spacing" textLength="183.6001" x="379" y="536.4927">candidate sites. Provides quick-access</text><text fill="#000000" font-family="Georgia" font-size="11" lengthAdjust="spacing" textLength="137.2314" x="379" y="548.9912">CTA to open full portfolio or</text><text fill="#000000" font-family="Georgia" font-size="11" lengthAdjust="spacing" textLength="173.8838" x="379" y="561.4897">compare sites (disabled if &lt; 2 sites).</text></g><!--link User to UC26--><g class="link" data-entity-1="ent0002" data-entity-2="ent0005" data-link-type="dependency" data-source-line="31" id="lnk11"><path d="M85.19,338.3972 C106.51,342.5172 127.5391,346.5984 151.4891,351.2284" fill="none" id="User-to-UC26" style="stroke:#111111;stroke-width:1;"/><polygon fill="#111111" points="157.38,3